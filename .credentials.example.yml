# Credentials pool template.
#
# To use:
#   1. cp .credentials.example.yml .credentials.yml
#   2. Fill in your real tokens, keys, and cookies in .credentials.yml
#   3. Verify .credentials.yml is gitignored (it is — see .gitignore)
#   4. Never commit .credentials.yml. Never paste contents into chat.
#
# Multiple values per service enable rotation: scripts try tokens in order
# and fall through to the next on rate-limit (429) or server errors (5xx).
#
# Schema version: 1

version: 1

# ─────────────────────────────────────────────────────────────────
# Apify — TikTok video discovery
# ─────────────────────────────────────────────────────────────────
# Used by hanuman/scripts/competitor-discovery.sh.
# Each token comes from https://console.apify.com/account/integrations.
#
# Rotation policy:
#   - Scripts try tokens in list order.
#   - On 429 (rate limit) or 5xx, fall through to next token.
#   - On 4xx other than 429 (auth failure, bad request): log + try next.
#   - If all tokens exhausted: write error JSON and exit gracefully.
#
# ToS note: Apify's terms typically prohibit multi-account use to evade
# resource limits. A single paid Starter plan ($49/mo) is the cleanest
# alternative and likely a "yes" from Mayank as part of the pipeline pitch.

apify:
  tokens:
    - "apify_api_REPLACE_ME_1"
    # - "apify_api_REPLACE_ME_2"
    # - "apify_api_REPLACE_ME_3"

# ─────────────────────────────────────────────────────────────────
# Gemini — TikTok video content analysis (Phase 2, Arjuna)
# ─────────────────────────────────────────────────────────────────
# Used by arjuna for per-video analysis (transcript, hook, claims, format).
# Each key from https://aistudio.google.com/apikey
#
# Free tier: 60 requests/minute. For 25-50 videos/day, a single key is
# usually enough, but rotation handles transient errors.

gemini:
  keys:
    - "AIzaSy_REPLACE_ME_1"
    # - "AIzaSy_REPLACE_ME_2"

# ─────────────────────────────────────────────────────────────────
# Kalodata — creator analytics (used by hanuman per-creator scout path, NOT competitor pipeline)
# ─────────────────────────────────────────────────────────────────
# Kalodata doesn't expose a public API tier we can access at intern level,
# so we use logged-in session cookies copied from a browser.
#
# Capture steps:
#   1. Log in at https://www.kalodata.com on a fresh browser session.
#   2. DevTools → Network tab → any kalodata.com request → Headers →
#      Request Headers → Cookie. Copy the full value.
#   3. Also copy User-Agent from the same request headers (must match the
#      session that generated the cookie, or kalodata may invalidate it).
#   4. Paste both into .credentials.yml.
#
# Lifetime: kalodata cookies typically last days to weeks. When they expire,
# scripts will get 401/redirect-to-login. You'll need to re-capture and
# update .credentials.yml. Hanuman's skill.md notes how to detect this.

kalodata:
  cookie: "REPLACE_ME_paste_full_cookie_header_value_here"
  user_agent: "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7) AppleWebKit/..."
  # Optional CSRF / session tokens if kalodata requires them:
  # csrf_token: ""
  # session_id: ""
