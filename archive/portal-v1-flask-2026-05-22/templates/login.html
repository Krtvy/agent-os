<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Rootlabs Data Portal — Log in</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        max-width: 480px;
        margin: 80px auto;
        padding: 0 24px;
        color: #222;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 8px;
      }
      p {
        color: #666;
        margin-bottom: 24px;
      }
      .btn {
        display: inline-block;
        padding: 12px 20px;
        background: #1a73e8;
        color: white;
        text-decoration: none;
        border-radius: 4px;
        font-weight: 500;
      }
      .btn:hover {
        background: #1557b0;
      }
      code {
        background: #f5f5f5;
        padding: 2px 6px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <h1>Rootlabs Data Portal</h1>
    <p>
      Sign in with your <code>@{{ allowed_domain }}</code> Google account.
      Non-Mosaic addresses cannot access the portal.
    </p>
    <a class="btn" href="/auth/google">Sign in with Google</a>
  </body>
</html>
