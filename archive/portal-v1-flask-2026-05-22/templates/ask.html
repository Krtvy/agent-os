<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ask a question — Rootlabs Data Portal</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        max-width: 720px;
        margin: 60px auto;
        padding: 0 24px;
        color: #222;
      }
      h1 {
        font-size: 22px;
      }
      label {
        display: block;
        margin: 16px 0 4px;
        font-weight: 500;
      }
      textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-family: inherit;
        font-size: 14px;
        min-height: 140px;
      }
      .btn {
        padding: 12px 20px;
        background: #1a73e8;
        color: white;
        border: none;
        border-radius: 4px;
        font-weight: 500;
        cursor: pointer;
        margin-top: 20px;
      }
      .btn:hover {
        background: #1557b0;
      }
      .hint {
        color: #666;
        font-size: 13px;
        margin-top: 4px;
      }
      a.back {
        color: #1a73e8;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <p><a class="back" href="/">← back</a></p>
    <h1>Ask a question</h1>
    <form method="post">
      <label for="question">Your question</label>
      <textarea
        id="question"
        name="question"
        placeholder="e.g. 'How much livestream GMV did Trupti's creators do in May 2026, broken down by product?'"
        required
      ></textarea>
      <div class="hint">
        Yudhi will profile the data, declare filters before computing, audit the
        result, and return a CSV + an audit `.md` explaining how he got there.
      </div>
      <button type="submit" class="btn">Send to Yudhi</button>
    </form>
  </body>
</html>
